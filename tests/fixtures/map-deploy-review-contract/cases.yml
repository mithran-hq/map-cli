- name: valid_manifest
  expected_status: passed
  expected_codes: []
  expected_paths: []
  manifest: |
    apiVersion: map.mithran/v1
    kind: MithranApp
    metadata:
      app_id: acme-inventory
      name: Acme Inventory
      description: Order management
      tags: [inventory, ops]
      domain:
        owner: platform-team
      labels:
        tier: s1
    identity:
      project_ref: owner/repo
      environment: prod
    capabilities:
      - kind: http
        route: /
        runtime: python311
        startup:
          command: uvicorn main:app --host 0.0.0.0 --port $PORT
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
      concurrency:
        max_in_flight: 16
      replicas:
        min: 1
        max: 6
    non_secret_env:
      - name: LOG_LEVEL
        value: info
    secret_bindings:
      - name: db-secret
        mount:
          kind: env
          target: DATABASE_URL
        purpose: database
        required: true
        rotation:
          required: never
          max_age_days: 45
    oauth_api:
      enabled: true
      path: /oauth/callback
      audience:
        - https://api.acme.internal
      allowed_methods: [GET, POST]
      scope:
        default: read
        optional: [write]
    public_edge:
      type: platform
      exposure: protected
      allow:
        - type: oauth_api
          path: /oauth/callback
          audience: [https://api.acme.internal]
      review_exceptions:
        - policy_ref: policy://corp/load-balancer/no-bot-trace/2026-05-25
          reason: legacy-cidr-probe
          scope: ingress-rate-limits
    app_env:
      preview:
        branch_pattern: ^refs/heads/feat/
        image_tag: preview
        env_overrides:
          - name: LOG_LEVEL
            value: debug
      production:
        branch_pattern: ^refs/heads/main$
        image_tag: prod
        policy:
          protect_in_review: true

- name: missing_manifest
  missing_manifest: true
  expected_status: blocked
  expected_codes:
    - ERR_MANIFEST_MISSING
  expected_paths:
    - mithran.yaml

- name: parse_failure
  expected_status: blocked
  expected_codes:
    - ERR_MANIFEST_PARSE
  expected_paths:
    - mithran.yaml
  manifest: |
    apiVersion: map.mithran/v1
    kind: [MithranApp

- name: wrong_api_version
  expected_status: blocked
  expected_codes:
    - ERR_API_VERSION
  expected_paths:
    - apiVersion
  manifest: |
    apiVersion: mithran/v0
    kind: MithranApp
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}

- name: wrong_kind
  expected_status: blocked
  expected_codes:
    - ERR_KIND
  expected_paths:
    - kind
  manifest: |
    apiVersion: map.mithran/v1
    kind: Service
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}

- name: forbidden_legacy_public_fields
  expected_status: blocked
  expected_codes:
    - ERR_BODY_SIZE_LIMIT
    - ERR_LIVE_GRANTS
    - ERR_PUBLIC
    - ERR_PUBLIC_API
  expected_paths:
    - body_size_limit_mb
    - grants
    - public
    - public_api
  manifest: |
    apiVersion: map.mithran/v1
    kind: MithranApp
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}
    public_api: true
    public: true
    body_size_limit_mb: 50
    grants: []

- name: secret_looking_non_secret_env
  expected_status: blocked
  expected_codes:
    - ERR_SECRET_VALUE
    - ERR_SECRET_VALUE
  expected_paths:
    - non_secret_env[0].name
    - non_secret_env[0].value
  manifest: |
    apiVersion: map.mithran/v1
    kind: MithranApp
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}
    non_secret_env:
      - name: API_TOKEN
        value: sk_live_not_allowed

- name: invalid_public_edge
  expected_status: blocked
  expected_codes:
    - ERR_PUBLIC_EDGE_EXPOSURE
    - ERR_PUBLIC_EDGE_EXPR
    - ERR_PUBLIC_EDGE_TYPE
  expected_paths:
    - public_edge.exposure
    - public_edge
    - public_edge.type
  manifest: |
    apiVersion: map.mithran/v1
    kind: MithranApp
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}
    public_edge:
      type: cloud-armor
      exposure: internet
      cloud_armor_expression: request.path.startsWith('/api')

- name: invalid_oauth_api
  expected_status: blocked
  expected_codes:
    - ERR_OAUTH_API
    - ERR_OAUTH_API
    - ERR_OAUTH_API
    - ERR_OAUTH_API
    - ERR_PUBLIC_API
  expected_paths:
    - oauth_api.allowed_methods
    - oauth_api.audience
    - oauth_api.path
    - oauth_api.scope.default
    - oauth_api
  manifest: |
    apiVersion: map.mithran/v1
    kind: MithranApp
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}
    oauth_api:
      enabled: true
      path: ""
      audience: []
      allowed_methods: []
      scope:
        default: ""
      api_key: legacy

- name: invalid_app_env_trigger_refs
  expected_status: blocked
  expected_codes:
    - ERR_APP_ENV
  expected_paths:
    - app_env.production.auto_deploy_refs[0]
  manifest: |
    apiVersion: map.mithran/v1
    kind: MithranApp
    metadata: {app_id: acme-inventory, name: Acme Inventory}
    identity: {project_ref: owner/repo}
    app_env:
      production:
        branch_pattern: ^refs/heads/main$
        image_tag: prod
        auto_deploy_refs:
          - main
