# map-deploy.yml — opt-in MAP custom-CI deploy trigger.
#
# Deploys fire from THREE triggers only — NO deploy-on-every-push:
#   • push/merge to a release branch (release/**) → production deploy of that SHA
#   • a release tag (vX.Y.Z, semver)              → production deploy of that SHA
#   • manual GitHub Actions workflow_dispatch     → selected app env + ref
# GitHub Actions is the trigger + audit/status surface ONLY. No LLM / build / heavy
# work runs here — the deploy-review gate stays server-side in mithran-control-plane.
# This workflow POSTs the deploy request to the control-plane chokepoint
# `/v1/map-control/deploy/request`; the state machine reviews-before-build as usual.
#
# `map onboard <owner/repo> --repo-dir <checkout> --with-ci-workflow` drops this file
# into a repo at `.github/workflows/map-deploy.yml`. Keep it in sync with
# map-cli/templates/map-deploy.yml.
#
# AUTH (ADR-0023, keyless): the workflow authenticates to the PUBLIC control-plane edge
# via GitHub OIDC federation — NO stored deploy secret. It requests a GitHub Actions OIDC
# token (audience = map-control) and exchanges it at mithran-auth for a short-lived
# map-control token, which the Envoy edge ext_authz validates. mithran-auth mints only for
# a repo with an ACTIVE onboarding binding (so `map onboard` must have run). Runs on a
# GitHub-hosted runner against the public authenticated edge.

name: map-deploy

on:
  # Release line → production. A push/merge to a release branch, or a semver
  # release tag, deploys that exact SHA. NO other branch (main, feature/*) triggers
  # a deploy — only release branches/tags + the manual dispatch below.
  push:
    branches:
      - 'release/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      env:
        description: "App environment to deploy (preview | production)."
        required: false
        default: production
        type: string
      ref:
        description: "Git ref or 40-hex SHA to deploy (defaults to the pushed/HEAD SHA)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  # ADR-0023: required to mint the GitHub Actions OIDC token exchanged for a map-control token.
  id-token: write

jobs:
  request-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Required production repo Variables (Settings → Secrets and variables → Actions → Variables).
      MAP_CONTROL_ENDPOINT: ${{ vars.MAP_CONTROL_ENDPOINT }}
      MAP_AUTH_ENDPOINT: ${{ vars.MAP_AUTH_ENDPOINT }}
      MAP_PLATFORM_ENV: ${{ vars.MAP_PLATFORM_ENV }}
      MAP_INSTALLATION_REF: ${{ vars.MAP_INSTALLATION_REF }}
      MAP_APP_REF: ${{ vars.MAP_APP_REF }}
      # Optional override; the default is the public OIDC audience for map-control.
      MAP_OIDC_AUDIENCE: ${{ vars.MAP_OIDC_AUDIENCE || 'map-control' }}
      # Optional per-repo routing config. No secrets — auth is via OIDC.
      MAP_TENANT_REF: ${{ vars.MAP_TENANT_REF }}
      MAP_ACCOUNT_REF: ${{ vars.MAP_ACCOUNT_REF }}
      INPUT_ENV: ${{ inputs.env }}
      INPUT_REF: ${{ inputs.ref }}
    steps:
      - name: Exchange GitHub OIDC for a map-control token, then POST the deploy request
        shell: bash
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"                  # owner/repo
          platform_env="${MAP_PLATFORM_ENV}"

          missing=0
          for name in MAP_CONTROL_ENDPOINT MAP_AUTH_ENDPOINT MAP_PLATFORM_ENV MAP_INSTALLATION_REF MAP_APP_REF; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} production repository variable is required for the opt-in MAP custom-CI deploy workflow. Set it in GitHub Actions Variables after running 'map onboard --with-ci-workflow'." >&2
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          # Trigger-aware. A release-branch / tag PUSH deploys the pushed SHA to
          # production; manual dispatch uses the operator's env + ref. Nothing else
          # reaches this workflow (see the `on:` filter) — no deploy-on-every-push.
          case "${GITHUB_EVENT_NAME}" in
            push)
              requested_ref="${GITHUB_SHA}"
              app_env="production"
              ;;
            *)  # workflow_dispatch (manual `map deploy`)
              requested_ref="${INPUT_REF:-$GITHUB_SHA}"
              app_env="${INPUT_ENV:-production}"
              ;;
          esac
          deployment_ref="deployment://${platform_env}/${app_env}/${repo##*/}-${GITHUB_RUN_ID}"

          # ADR-0023 keyless auth: GitHub OIDC token (aud=map-control) → mithran-auth exchange
          # → short-lived map-control token. id-token:write (above) provides the request creds.
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::no GitHub OIDC request credentials — ensure 'permissions: id-token: write'." >&2
            exit 1
          fi
          oidc_token="$(curl -sS --max-time 60 \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${MAP_OIDC_AUDIENCE}" | jq -r '.value // empty')"
          if [ -z "${oidc_token}" ]; then
            echo "::error::failed to obtain a GitHub OIDC token." >&2
            exit 1
          fi
          exchange_code="$(curl -sS --max-time 60 -o exchange.json -w '%{http_code}' \
            -X POST "${MAP_AUTH_ENDPOINT%/}/v1/auth/github-oidc/exchange" \
            -H 'content-type: application/json' \
            -d "$(jq -nc --arg t "${oidc_token}" '{oidc_token:$t}')")"
          if [ "${exchange_code}" != "200" ]; then
            echo "::error::OIDC token exchange failed (HTTP ${exchange_code}); is ${repo} onboarded (\`map onboard\`)?" >&2
            cat exchange.json || true
            exit 1
          fi
          map_token="$(jq -r '.access_token // empty' exchange.json)"
          if [ -z "${map_token}" ]; then
            echo "::error::OIDC exchange returned no access_token." >&2
            exit 1
          fi

          # The source broker rejects requested_ref containing secret/token/etc.;
          # for such branches pass the 40-hex SHA as the ref (see clean-room runbook §3).
          source_sha=""
          if printf '%s' "${requested_ref}" | grep -Eq '^[0-9a-f]{40}$'; then
            source_sha="${requested_ref}"
          fi

          body="$(jq -nc \
            --arg deployment_ref "${deployment_ref}" \
            --arg repository_ref "github://${repo}" \
            --arg requested_ref "${requested_ref}" \
            --arg source_sha "${source_sha}" \
            --arg installation_ref "${MAP_INSTALLATION_REF}" \
            --arg app_ref "${MAP_APP_REF}" \
            --arg app_env "${app_env}" \
            --arg tenant_ref "${MAP_TENANT_REF}" \
            --arg account_ref "${MAP_ACCOUNT_REF}" \
            --arg platform_env "${platform_env}" \
            '{deployment_ref:$deployment_ref, repository_ref:$repository_ref,
              requested_ref:$requested_ref, installation_ref:$installation_ref,
              app_ref:$app_ref, app_env:$app_env, tenant_ref:$tenant_ref,
              account_ref:$account_ref, platform_env:$platform_env}
             | if $source_sha != "" then . + {source_sha:$source_sha} else . end')"

          echo "Dispatching deploy: ${deployment_ref} (env=${app_env} ref=${requested_ref})"

          http_code="$(curl -sS --max-time 600 -o response.json -w '%{http_code}' \
            -X POST "${MAP_CONTROL_ENDPOINT%/}/v1/map-control/deploy/request" \
            -H 'content-type: application/json' \
            -H "authorization: Bearer ${map_token}" \
            -d "${body}")"

          echo "control-plane HTTP ${http_code}"
          cat response.json || true
          case "${http_code}" in
            200|201|202) ;;
            *) echo "::error::deploy request failed (HTTP ${http_code})" >&2; exit 1 ;;
          esac
